<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#102820">
  <meta name="description" content="ブラウザですぐ遊べる2Dアクションゲーム Slime Quest">
  <title>Slime Quest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">BROWSER ACTION GAME</p>
        <h1>SLIME <span>QUEST</span></h1>
        <p class="tagline">コインを集め、森の奥のゴールを目指そう。</p>
      </div>
      <div class="header-actions">
        <button id="soundButton" class="icon-button" type="button" aria-label="サウンド切替">🔊</button>
        <button id="pauseButton" class="icon-button" type="button" aria-label="一時停止">⏸</button>
      </div>
    </header>

    <section class="game-card" aria-label="Slime Quest ゲーム">
      <div class="hud" aria-live="polite">
        <div><span class="hud-label">LIFE</span><strong id="lifeValue">♥♥♥</strong></div>
        <div><span class="hud-label">COIN</span><strong id="coinValue">0 / 0</strong></div>
        <div><span class="hud-label">TIME</span><strong id="timeValue">0.0</strong></div>
        <div><span class="hud-label">BEST</span><strong id="bestValue">--</strong></div>
      </div>
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="960" height="540" aria-label="2D platform game canvas"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <p class="overlay-kicker">WELCOME TO</p>
            <h2 id="overlayTitle">SLIME QUEST</h2>
            <p id="overlayMessage">矢印キー / A・D で移動、スペースでジャンプ。スマホは画面下のボタンで操作できます。</p>
            <button id="startButton" class="primary-button" type="button">ゲームスタート</button>
          </div>
        </div>
      </div>
      <div class="touch-controls" aria-label="タッチ操作">
        <div class="touch-cluster">
          <button data-control="left" class="touch-button" type="button" aria-label="左へ移動">←</button>
          <button data-control="right" class="touch-button" type="button" aria-label="右へ移動">→</button>
        </div>
        <button data-control="jump" class="touch-button jump" type="button" aria-label="ジャンプ">↑</button>
      </div>
    </section>

    <section class="info-grid">
      <article>
        <h2>遊び方</h2>
        <p>全コインを集めて右端のクリスタルへ。トゲや敵に触れるとライフが減ります。</p>
      </article>
      <article>
        <h2>ベストタイム</h2>
        <ol id="rankingList" class="ranking-list"><li>まだ記録がありません</li></ol>
      </article>
      <article>
        <h2>操作</h2>
        <p><kbd>←</kbd><kbd>→</kbd> / <kbd>A</kbd><kbd>D</kbd> 移動　<kbd>Space</kbd> / <kbd>W</kbd> ジャンプ　<kbd>P</kbd> 一時停止</p>
      </article>
    </section>
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
