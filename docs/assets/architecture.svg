<g><rect x="820" y="495" width="510" height="120" rx="24" fill="#252e43" stroke="#7c9cff"/><text x="1075" y="545" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">DELIVERY PIPELINE</text><text x="1075" y="579" text-anchor="middle" fill="#cbd4ed" font-size="18">GitHub Actions CI → Cloudflare Pages → Public URL</text></g>
