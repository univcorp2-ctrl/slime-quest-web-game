<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="680" viewBox="0 0 1400 680" role="img" aria-labelledby="title desc">
<title id="title">Slime Quest architecture</title><desc id="desc">Browser input flows into the canvas game engine, local ranking storage, sound and deployment pipeline.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#102b25"/><stop offset="1" stop-color="#0b1720"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".3"/></filter></defs>
<rect width="1400" height="680" rx="36" fill="url(#bg)"/>
<text x="70" y="90" fill="#80ef6e" font-family="system-ui,sans-serif" font-size="26" font-weight="800" letter-spacing="4">SLIME QUEST</text>
<text x="70" y="138" fill="#fff" font-family="system-ui,sans-serif" font-size="44" font-weight="800">Architecture &amp; Game Flow</text>
<g font-family="system-ui,sans-serif" filter="url(#shadow)">
<g><rect x="70" y="230" width="240" height="150" rx="24" fill="#153d35" stroke="#58dba5"/><text x="190" y="285" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">PLAYER INPUT</text><text x="190" y="325" text-anchor="middle" fill="#b9d6cc" font-size="18">Keyboard / Touch</text><text x="190" y="354" text-anchor="middle" fill="#b9d6cc" font-size="18">Pause / Sound</text></g>
<g><rect x="410" y="200" width="300" height="210" rx="24" fill="#194751" stroke="#57bff5"/><text x="560" y="260" text-anchor="middle" fill="#fff" font-size="25" font-weight="700">CANVAS GAME ENGINE</text><text x="560" y="302" text-anchor="middle" fill="#c0dce4" font-size="18">Physics &amp; Collisions</text><text x="560" y="333" text-anchor="middle" fill="#c0dce4" font-size="18">World Rendering</text><text x="560" y="364" text-anchor="middle" fill="#c0dce4" font-size="18">Game State</text></g>
<g><rect x="820" y="190" width="230" height="150" rx="24" fill="#41373b" stroke="#ffd65a"/><text x="935" y="245" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">LOCAL DATA</text><text x="935" y="286" text-anchor="middle" fill="#e8d8c1" font-size="18">Best Times</text><text x="935" y="315" text-anchor="middle" fill="#e8d8c1" font-size="18">localStorage</text></g>
<g><rect x="1100" y="190" width="230" height="150" rx="24" fill="#3b294b" stroke="#ca8cff"/><text x="1215" y="245" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">WEB AUDIO</text><text x="1215" y="286" text-anchor="middle" fill="#ddcbe9" font-size="18">Jump / Coin</text><text x="1215" y="315" text-anchor="middle" fill="#ddcbe9" font-size="18">Result Feedback</text></g>
